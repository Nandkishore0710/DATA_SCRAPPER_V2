<div class="content-area" id="history-content" style="display: none;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; padding: 0 4px;">
        <div>
            <h1 style="font-size: 1.6rem; font-weight: 800; color: var(--text-main); margin-bottom: 4px; letter-spacing: -0.02em;">Extraction Protocol Log</h1>
            <p style="font-size: 0.8rem; color: var(--text-muted); font-weight: 500;">Review all past scraping operations and data archives.</p>
        </div>
        <div style="display: flex; align-items: center; gap: 12px; background: white; padding: 6px 16px; border-radius: 12px; border: 1px solid var(--border-light); box-shadow: 0 4px 15px rgba(0,0,0,0.02);">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2.5"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
            <select id="history-date-filter" onchange="renderHistory()" style="border: none; background: transparent; font-size: 0.8rem; font-weight: 700; color: var(--text-main); outline: none; cursor: pointer; font-family: inherit;">
                <option value="all">Protocol: All History</option>
                <option value="today">Protocol: Today Only</option>
                <option value="yesterday">Protocol: Yesterday</option>
                <option value="7days">Protocol: Last 7 Days</option>
                <option value="30days">Protocol: Last 30 Days</option>
            </select>
        </div>
    </div>

    <div style="background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; box-shadow: var(--shadow);">
        <table style="width: 100%; border-collapse: collapse; text-align: left;">
            <thead>
                <tr style="background: var(--bg-color); border-bottom: 1px solid var(--border);">
                    <th style="padding: 18px 24px; font-size: 0.65rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; width: 150px;">Status</th>
                    <th style="padding: 18px 12px; font-size: 0.65rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; width: 180px;">Temporal Sync</th>
                    <th style="padding: 18px 12px; font-size: 0.65rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; width: 140px;">Yield Status</th>
                    <th style="padding: 18px 24px; font-size: 0.65rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em;">Parameters & Targeting</th>
                    <th style="padding: 18px 24px; text-align: right; width: 100px;"></th>
                </tr>
            </thead>
            <tbody id="history-table-body">
                <!-- Data populated via JS -->
            </tbody>
        </table>
        <div id="history-empty" style="display: none; padding: 60px; text-align: center; color: var(--text-muted);">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-bottom: 16px; opacity: 0.3;"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <p style="font-size: 0.9rem; font-weight: 600;">No extraction logs found in this temporal frame.</p>
        </div>
    </div>
</div>
